<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>CINEFLEX | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{ background:#050816; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Poppins', sans-serif; }
    .box{ background:rgba(255,255,255,0.05); padding:40px; border-radius:20px; width:340px; border:1px solid rgba(255,255,255,0.1); text-align:center; backdrop-filter:blur(10px); }
    input{ width:100%; padding:12px; margin:10px 0; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.2); border-radius:10px; color:white; box-sizing: border-box;}
    button{ width:100%; padding:12px; border:none; border-radius:10px; background:linear-gradient(90deg,#0077ff,#ff004f); color:white; font-weight:bold; cursor:pointer; margin-top:10px; }
    p{ font-size:13px; color:#aaa; margin-top:15px; } a{ color:#0077ff; text-decoration:none; }
  </style>
</head>
<body>
<div class="box">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p>Don't have an account? <a href="signup.html">Register</a></p>
</div>

<script src="database.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const users = DB.getUsers();

      const user = users.find(u => u.email === email && u.password === pass);
      if(user) {
          localStorage.setItem('loggedInUser', JSON.stringify(user));
          if(user.role === 'admin') {
              window.location.href = 'admin.html'; // ඇඩ්මින් නම් ඩෑෂ්බෝඩ් එකට
          } else {
              window.location.href = 'index.html'; // යූසර් නම් හෝම් පේජ් එකට
          }
      } else {
          alert('Invalid Email or Password, Machan!');
      }
  });
</script>
</body>
</html>
