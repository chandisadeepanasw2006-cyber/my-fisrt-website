<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CINEFLEX | Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #050816; color: #fff; min-height: 100vh; padding: 40px 7%; position: relative; overflow-x: hidden; }
    body::before { content: ''; position: fixed; width: 500px; height: 500px; background: rgba(0, 123, 255, 0.15); filter: blur(120px); top: -100px; left: -100px; z-index: -1; }
    
    .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 20px; }
    .logo { display: flex; align-items: center; gap: 12px; font-size: 1.8rem; font-weight: 800; letter-spacing: 1px; }
    .logo span { background: linear-gradient(90deg, #2ea0ff, #ff004f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .back-btn { color: #8c8ca1; text-decoration: none; font-weight: 500; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
    .back-btn:hover { color: #2ea0ff; }

    .dashboard-container { max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 40px; backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45); }
    .dashboard-container h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 25px; letter-spacing: 0.5px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group input { width: 100%; padding: 16px 20px; background: rgba(10, 14, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; color: #fff; font-size: 0.95rem; transition: 0.3s; }
    .input-group input:focus { outline: none; border-color: #0077ff; box-shadow: 0 0 15px rgba(0, 119, 255, 0.2); }
    .input-group input::placeholder { color: #4e5264; }

    .add-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: #0077ff; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3); }
    .add-btn:hover { background: #0062d1; transform: translateY(-2px); }
    .add-btn:active { transform: translateY(0); }

    .msg { text-align: center; margin-top: 15px; font-size: 0.9rem; display: none; }
    .success { color: #00ff77; }
  </style>
</head>
<body>

  <div class="header-area">
    <div class="logo">⚡ <span>CINEFLEX Admin Dashboard</span></div>
    <a href="index.html" class="back-btn">← Back to Site</a>
  </div>

  <div class="dashboard-container">
    <h2>Add New Movie</h2>
    
    <div class="input-group">
      <input type="text" id="movieTitle" placeholder="Movie Title" required>
    </div>
    
    <div class="input-group">
      <input type="text" id="movieGenre" placeholder="Genre (e.g. Action • Sci-Fi)" required>
    </div>
    
    <div class="input-group">
      <input type="text" id="movieImg" placeholder="Image URL (Unsplash Link)">
    </div>

    <div class="input-group">
      <input type="text" id="movieLink" placeholder="Watch / Stream URL (e.g. Video Link)">
    </div>

    <div class="input-group">
      <input type="text" id="movieDownload" placeholder="Direct Download URL (Optional)">
    </div>

    <button class="add-btn" onclick="addNewMovie()">Add Movie</button>
    <div id="statusMsg" class="msg success">Movie Added Successfully!</div>
  </div>

  <script>
    // 🔐 ආරක්ෂාව සඳහා ඇඩ්මින් කෙනෙක් ලොග් වෙලා ඉන්නවද කියලා පරික්ෂා කිරීම
    window.onload = function() {
        const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!loggedInUser || loggedInUser.role !== 'admin') {
            alert("Access Denied! Admins only.");
            window.location.href = "login.html"; // ඇඩ්මින් කෙනෙක් නොවේ නම් ලොගින් පිටුවට හරවා යවයි
        }
    }

    // 💾 චිත්‍රපටය LocalStorage එකට සේව් කරන Function එක
    function addNewMovie() {
        const title = document.getElementById('movieTitle').value.trim();
        const genre = document.getElementById('movieGenre').value.trim();
        const img = document.getElementById('movieImg').value.trim();
        const link = document.getElementById('movieLink').value.trim();
        const download = document.getElementById('movieDownload').value.trim(); // ඩවුන්ලෝඩ් දත්තය ලබා ගැනීම

        // අනිවාර්ය Field පිරෙව්වාද කියා බැලීම
        if (title === "" || genre === "") {
            alert("Please enter at least Title and Genre!");
            return;
        }

        // නව චිත්‍රපටයේ Object එකක් සෑදීම
        const newMovieObj = {
            title: title,
            genre: genre,
            img: img ? img : "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=400", // පෝස්ටරයක් නැතිනම් Default එකක් වැටේ
            link: link ? link : "#",
            download: download ? download : "#" // ඩවුන්ලෝඩ් ලින්ක් එක එකතු කිරීම
        };

        // කලින් තිබුන ලිස්ට් එක ලබාගෙන අලුත් එක එකතු කිරීම
        const currentMovies = JSON.parse(localStorage.getItem('movies')) || [];
        currentMovies.push(newMovieObj);
        
        // ආපසු LocalStorage එකට සේව් කිරීම
        localStorage.setItem('movies', JSON.stringify(currentMovies));

        // Form එක Reset කිරීම සහ Success Message එක පෙන්වීම
        document.getElementById('movieTitle').value = '';
        document.getElementById('movieGenre').value = '';
        document.getElementById('movieImg').value = '';
        document.getElementById('movieLink').value = '';
        document.getElementById('movieDownload').value = '';

        const statusMsg = document.getElementById('statusMsg');
        statusMsg.style.display = 'block';
        setTimeout(() => {
            statusMsg.style.style.display = 'none';
        }, 3000);
    }
  </script>
</body>
</html>
