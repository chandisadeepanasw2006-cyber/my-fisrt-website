<!-- FULL RESPONSIVE ADMIN VERSION -->
<!-- SAVE AS index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEFLEX</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#050816;
color:#fff;
overflow-x:hidden;
}

img{
max-width:100%;
display:block;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 7%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
z-index:999;
}

.logo{
font-size:1.8rem;
font-weight:800;
background:linear-gradient(90deg,#2ea0ff,#ff004f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav{
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:500;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:140px 7% 80px;
text-align:center;
}

.hero h1{
font-size:4rem;
margin-bottom:20px;
}

.hero h1 span{
background:linear-gradient(90deg,#2ea0ff,#ff004f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
max-width:700px;
line-height:1.8;
color:#c7c7d6;
margin-bottom:30px;
}

.btn{
padding:14px 28px;
border-radius:14px;
background:linear-gradient(90deg,#0077ff,#ff004f);
text-decoration:none;
color:#fff;
font-weight:600;
display:inline-block;
}

section{
padding:90px 7%;
}

.section-title{
text-align:center;
font-size:2.7rem;
margin-bottom:50px;
}

.section-title span{
background:linear-gradient(90deg,#2ea0ff,#ff004f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.upload-area,
.admin-container{
background:rgba(255,255,255,0.05);
padding:35px;
border-radius:24px;
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.08);
margin-bottom:30px;
}

.upload-btn{
display:inline-block;
padding:14px 28px;
background:linear-gradient(90deg,#0077ff,#ff004f);
border-radius:14px;
cursor:pointer;
font-weight:600;
margin-top:20px;
}

input[type="file"]{
display:none;
}

.movies-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:40px;
}

.movie-card{
background:rgba(255,255,255,0.05);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.07);
}

.movie-card img{
width:100%;
height:300px;
object-fit:cover;
}

.movie-info{
padding:18px;
}

.movie-info p{
color:#aaa;
margin-top:6px;
margin-bottom:15px;
}

.movie-actions{
display:flex;
gap:10px;
}

.watch-btn,
.download-btn{
flex:1;
padding:12px;
text-align:center;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

.watch-btn{
background:#0077ff;
color:#fff;
}

.download-btn{
border:1px solid #ff004f;
color:#ff004f;
}

.input-group{
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
background:#101528;
color:#fff;
}

.admin-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#0077ff;
color:#fff;
font-weight:600;
cursor:pointer;
}

.manage-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
gap:15px;
}

.manage-buttons{
display:flex;
gap:10px;
}

.edit-btn,
.delete-btn{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.edit-btn{
background:#0077ff;
color:#fff;
}

.delete-btn{
background:#ff004f;
color:#fff;
}

footer{
text-align:center;
padding:30px;
color:#888;
}

@media(max-width:900px){

header{
flex-direction:column;
gap:12px;
padding:14px 5%;
}

nav{
justify-content:center;
}

.hero h1{
font-size:2.4rem;
}

.movies-grid{
grid-template-columns:1fr;
}

.movie-card img{
height:260px;
}

.movie-actions{
flex-direction:column;
}

.manage-item{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<header>

<div class="logo">CINEFLEX</div>

<nav>
<a href="#home">Home</a>
<a href="#admin">Dashboard</a>
<a href="#upload">Upload</a>
<a href="#movies">Movies</a>
</nav>

</header>

<section class="hero" id="home">

<h1>Unlimited Movies With <span>CINEFLEX</span></h1>

<p>
Modern streaming platform with admin dashboard,
movie uploads and responsive design.
</p>

<a href="#movies" class="btn">Explore Movies</a>

</section>

<section id="admin">

<h2 class="section-title">
Admin <span>Dashboard</span>
</h2>

<div class="admin-container">

<div class="input-group">
<input type="text" id="movieTitle" placeholder="Movie Title">
</div>

<div class="input-group">
<input type="text" id="movieGenre" placeholder="Genre">
</div>

<div class="input-group">
<input type="text" id="movieImg" placeholder="Poster Image URL">
</div>

<div class="input-group">
<input type="text" id="movieLink" placeholder="Movie Link">
</div>

<button class="admin-btn" onclick="saveMovie()">
Add Movie
</button>

</div>

<div class="admin-container">

<h3 style="margin-bottom:20px;">
Manage Movies
</h3>

<div id="adminList"></div>

</div>

</section>

<section id="upload">

<h2 class="section-title">
Upload <span>Videos</span>
</h2>

<div class="upload-area">

<h3>Upload Video File</h3>

<label for="movieUpload" class="upload-btn">
Choose Video
</label>

<input type="file" id="movieUpload" accept="video/*">

<div id="previewContainer" style="margin-top:30px;"></div>

</div>

</section>

<section id="movies">

<h2 class="section-title">
Trending <span>Movies</span>
</h2>

<div class="movies-grid" id="moviesGrid"></div>

</section>

<footer>
© 2026 CINEFLEX
</footer>

<script>

let currentEdit=-1;

let movies=JSON.parse(localStorage.getItem('movies')) || [

{
title:"Cyber Future",
genre:"Sci-Fi",
img:"https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=400",
link:"#"
}

];

function saveStorage(){
localStorage.setItem('movies',JSON.stringify(movies));
}

function loadMovies(){

const grid=document.getElementById('moviesGrid');
grid.innerHTML='';

movies.forEach((m,index)=>{

grid.innerHTML+=`

<div class="movie-card">

<img src="${m.img}" alt="movie">

<div class="movie-info">

<h4>${m.title}</h4>

<p>${m.genre}</p>

<div class="movie-actions">

<a href="${m.link}" class="watch-btn">
Watch
</a>

<a href="${m.link}" class="download-btn">
Download
</a>

</div>

</div>

</div>

`;

});

renderAdmin();

}

function renderAdmin(){

const list=document.getElementById('adminList');

list.innerHTML='';

movies.forEach((m,index)=>{

list.innerHTML+=`

<div class="manage-item">

<div>
<h4>${m.title}</h4>
<p>${m.genre}</p>
</div>

<div class="manage-buttons">

<button class="edit-btn"
onclick="editMovie(${index})">
Edit
</button>

<button class="delete-btn"
onclick="deleteMovie(${index})">
Delete
</button>

</div>

</div>

`;

});

}

function saveMovie(){

const title=document.getElementById('movieTitle').value;
const genre=document.getElementById('movieGenre').value;
const img=document.getElementById('movieImg').value;
const link=document.getElementById('movieLink').value;

if(!title || !genre){
alert('Enter title and genre');
return;
}

const obj={
title,
genre,
img:img || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=400',
link:link || '#'
};

if(currentEdit===-1){
movies.unshift(obj);
}else{
movies[currentEdit]=obj;
currentEdit=-1;
}

saveStorage();
loadMovies();

document.getElementById('movieTitle').value='';
document.getElementById('movieGenre').value='';
document.getElementById('movieImg').value='';
document.getElementById('movieLink').value='';

}

function editMovie(index){

const m=movies[index];

document.getElementById('movieTitle').value=m.title;
document.getElementById('movieGenre').value=m.genre;
document.getElementById('movieImg').value=m.img;
document.getElementById('movieLink').value=m.link;

currentEdit=index;

}

function deleteMovie(index){

movies.splice(index,1);

saveStorage();

loadMovies();

}

const uploadInput=document.getElementById('movieUpload');

uploadInput.addEventListener('change',function(){

const file=this.files[0];

if(file){

const url=URL.createObjectURL(file);

document.getElementById('previewContainer').innerHTML=`

<video controls autoplay
style="width:100%;max-width:800px;border-radius:20px;">

<source src="${url}" type="${file.type}">

</video>

`;

movies.unshift({

title:file.name.replace(/\.[^/.]+$/, ""),
genre:"Uploaded Video",
img:"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=400",
link:url

});

saveStorage();

loadMovies();

}

});

loadMovies();

</script>

</body>
</html>
